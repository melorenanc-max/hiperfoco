<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiperfoco — Controle de Estudos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="app">
    <div id="mobile-header">
      <button id="menu-toggle" class="menu-toggle-btn">
        <span></span><span></span><span></span>
      </button>
      <div class="mobile-brand">⚡ Hiperfoco</div>
    </div>

    <div id="sidebar-overlay"></div>

    <nav id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">⚡</span>
        <span class="brand-text">Hiperfoco</span>
        <button id="sidebar-collapse-btn" title="Recolher menu" style="margin-left:auto;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.4);padding:4px;display:flex;align-items:center;transition:color 0.15s">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/>
          </svg>
        </button>
      </div>
      <ul class="nav-menu">
        <li><a href="#" data-page="dashboard" class="nav-link active">
          <span class="nav-icon">◈</span><span class="nav-label">Dashboard</span>
        </a></li>
        <li><a href="#" data-page="ciclo" class="nav-link">
          <span class="nav-icon">◎</span><span class="nav-label">Ciclo Semanal</span>
        </a></li>
        <li class="nav-separator"><span class="nav-sep-text">Planejamento</span></li>
        <li><a href="#" data-page="disciplinas" class="nav-link">
          <span class="nav-icon">▹</span><span class="nav-label">Disciplinas</span>
        </a></li>
        <li><a href="#" data-page="planejamento" class="nav-link">
          <span class="nav-icon">◧</span><span class="nav-label">Planejamento</span>
        </a></li>
        <li class="nav-separator"><span class="nav-sep-text">Análise</span></li>
        <li><a href="#" data-page="historico" class="nav-link">
          <span class="nav-icon">◷</span><span class="nav-label">Histórico & Stats</span>
        </a></li>
        <li class="nav-separator"><span class="nav-sep-text"></span></li>
        <li><a href="#" data-page="configuracoes" class="nav-link">
          <span class="nav-icon">⚙</span><span class="nav-label">Configurações</span>
        </a></li>
      </ul>
      <div id="sidebar-user">
        <div id="sidebar-user-foto" class="sidebar-user-foto">👤</div>
        <div class="sidebar-user-info">
          <div id="sidebar-user-nome" class="sidebar-user-nome"></div>
          <a href="/auth/logout" class="sidebar-user-sair">Sair</a>
        </div>
      </div>
    </nav>

    <main id="main-content">
      <div id="page-container"></div>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="btn-icon">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/ciclo.js"></script>
  <script src="/js/pages/disciplinas.js"></script>
  <script src="/js/pages/planejamento.js"></script>
  <script src="/js/pages/registro.js"></script>
  <script src="/js/pages/configuracoes.js"></script>
  <script src="/js/pages/historico.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
